<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>University Portal - Xác thực</title>

    <!-- Google Font & Icons -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/icheck-bootstrap/3.0.1/icheck-bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/admin-lte/3.2.0/css/adminlte.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/limonte-sweetalert2/11.7.3/sweetalert2.min.css">

    <style>
        .view-page { display: none; }
        .view-page.active { display: block; }
        .auth-wrapper {
            display: flex; align-items: center; justify-content: center;
            height: 100vh; background-color: #e9ecef;
        }
        .spinner-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8); z-index: 9999;
            display: none; align-items: center; justify-content: center;
        }
    </style>
</head>
<body class="hold-transition login-page">

<div id="loading" class="spinner-overlay">
    <div class="spinner-border text-primary" role="status"><span class="sr-only">Loading...</span></div>
</div>

<div id="auth-views" class="auth-wrapper">
    <!-- ĐĂNG NHẬP -->
    <div id="page-login" class="view-page login-box active">
        <div class="login-logo"><a href="#"><b>University</b>Portal</a></div>
        <div class="card card-outline card-primary">
            <div class="card-body login-card-body">
                <p class="login-box-msg">Đăng nhập để bắt đầu phiên làm việc</p>
                <form id="form-login">
                    <div class="input-group mb-3">
                        <input type="text" class="form-control" id="login-identifier" placeholder="Tên đăng nhập / Email / Mã SV" required>
                        <div class="input-group-append"><div class="input-group-text"><span class="fas fa-user"></span></div></div>
                    </div>
                    <div class="input-group mb-3">
                        <input type="password" class="form-control" id="login-password" placeholder="Mật khẩu" required>
                        <div class="input-group-append"><div class="input-group-text"><span class="fas fa-lock"></span></div></div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block mb-3">Đăng Nhập</button>
                </form>
                <a href="#" onclick="switchPage('page-forgot-password')" class="btn btn-block btn-danger mb-3">
                    <i class="fas fa-key mr-2"></i> Quên mật khẩu
                </a>
                <p class="mb-0 text-center"><a href="#" onclick="switchPage('page-register')">Đăng ký thành viên mới</a></p>
            </div>
        </div>
    </div>

    <!-- ĐĂNG KÝ -->
    <div id="page-register" class="view-page register-box">
        <div class="register-logo"><a href="#"><b>University</b>Portal</a></div>
        <div class="card card-outline card-primary">
            <div class="card-body register-card-body">
                <p class="login-box-msg">Đăng ký tài khoản mới</p>
                <form id="form-register">
                    <div class="input-group mb-3">
                        <input type="text" class="form-control" id="reg-username" placeholder="Tên đăng nhập" required minlength="3">
                        <div class="input-group-append"><div class="input-group-text"><span class="fas fa-user"></span></div></div>
                    </div>
                    <div class="input-group mb-3">
                        <input type="email" class="form-control" id="reg-email" placeholder="Email" required>
                        <div class="input-group-append"><div class="input-group-text"><span class="fas fa-envelope"></span></div></div>
                    </div>
                    <div class="input-group mb-3">
                        <input type="password" class="form-control" id="reg-password" placeholder="Mật khẩu (ít nhất 8 ký tự)" required minlength="8">
                        <div class="input-group-append"><div class="input-group-text"><span class="fas fa-lock"></span></div></div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Đăng Ký</button>
                </form>
                <a href="#" onclick="switchPage('page-login')" class="text-center mt-3 d-block">Tôi đã có tài khoản</a>
            </div>
        </div>
    </div>

    <!-- XÁC THỰC EMAIL -->
    <div id="page-verify-email" class="view-page login-box">
        <div class="login-logo"><a href="#"><b>Xác Thực</b>Email</a></div>
        <div class="card card-outline card-success">
            <div class="card-body login-card-body">
                <p class="login-box-msg">Nhập mã OTP đã gửi đến email</p>
                <form id="form-verify-email">
                    <div class="input-group mb-3">
                        <input type="email" class="form-control" id="verify-email" readonly required>
                        <div class="input-group-append"><div class="input-group-text"><span class="fas fa-envelope"></span></div></div>
                    </div>
                    <div class="input-group mb-3">
                        <input type="text" class="form-control" id="verify-otp" placeholder="Mã OTP (6 số)" required>
                        <div class="input-group-append"><div class="input-group-text"><span class="fas fa-key"></span></div></div>
                    </div>
                    <button type="submit" class="btn btn-success btn-block">Xác thực</button>
                </form>
                <button type="button" class="btn btn-link btn-block mt-2" onclick="resendOtp('verify-email')">Gửi lại OTP</button>
            </div>
        </div>
    </div>

    <!-- QUÊN MẬT KHẨU -->
    <div id="page-forgot-password" class="view-page login-box">
        <div class="login-logo"><a href="#"><b>Khôi Phục</b>Mật Khẩu</a></div>
        <div class="card card-outline card-danger">
            <div class="card-body login-card-body">
                <p class="login-box-msg">Nhập email để nhận mã OTP</p>
                <form id="form-forgot-password">
                    <div class="input-group mb-3">
                        <input type="email" class="form-control" id="forgot-email" placeholder="Email đăng ký" required>
                        <div class="input-group-append"><div class="input-group-text"><span class="fas fa-envelope"></span></div></div>
                    </div>
                    <button type="submit" class="btn btn-danger btn-block">Gửi OTP</button>
                </form>
                <p class="mt-3 mb-1 text-center"><a href="#" onclick="switchPage('page-login')">Quay lại đăng nhập</a></p>
            </div>
        </div>
    </div>

    <!-- RESET MẬT KHẨU -->
    <div id="page-reset-password" class="view-page login-box">
        <div class="login-logo"><a href="#"><b>Tạo Mới</b>Mật Khẩu</a></div>
        <div class="card card-outline card-danger">
            <div class="card-body login-card-body">
                <form id="form-reset-password">
                    <div class="input-group mb-3">
                        <input type="email" class="form-control" id="reset-email" readonly required>
                        <div class="input-group-append"><div class="input-group-text"><span class="fas fa-envelope"></span></div></div>
                    </div>
                    <div class="input-group mb-3">
                        <input type="text" class="form-control" id="reset-otp" placeholder="Mã OTP" required>
                        <div class="input-group-append"><div class="input-group-text"><span class="fas fa-key"></span></div></div>
                    </div>
                    <div class="input-group mb-3">
                        <input type="password" class="form-control" id="reset-new-password" placeholder="Mật khẩu mới" required minlength="8">
                        <div class="input-group-append"><div class="input-group-text"><span class="fas fa-lock"></span></div></div>
                    </div>
                    <button type="submit" class="btn btn-danger btn-block">Đổi mật khẩu</button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Scripts -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/limonte-sweetalert2/11.7.3/sweetalert2.all.min.js"></script>

<script>
    const API_URL = 'http://localhost:8080/api/auth';
    const Toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 3000 });

    // Bảo vệ route: Nếu đã có token, đá thẳng sang trang dashboard
    window.onload = () => {
        if (localStorage.getItem('accessToken')) window.location.href = '/dashboard';
    }

    function switchPage(pageId) {
        document.querySelectorAll('.view-page').forEach(el => el.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
    }

    function showLoading(show) { document.getElementById('loading').style.display = show ? 'flex' : 'none'; }

    async function fetchAPI(endpoint, method, bodyObj = null) {
        const options = { method, headers: { 'Content-Type': 'application/json' } };
        if (bodyObj) options.body = JSON.stringify(bodyObj);
        try {
            showLoading(true);
            const response = await fetch(`${API_URL}${endpoint}`, options);
            const data = await response.json();
            showLoading(false);
            if (!response.ok) throw new Error(data.message || data.error || 'Lỗi hệ thống');
            return data;
        } catch (err) {
            showLoading(false);
            Toast.fire({ icon: 'error', title: err.message });
            throw err;
        }
    }

    // Đăng nhập
    document.getElementById('form-login').addEventListener('submit', async (e) => {
        e.preventDefault();

        const identifier = document.getElementById('login-identifier').value;
        const password = document.getElementById('login-password').value;

        try {
            // SỬA Ở ĐÂY: Gửi key "identifier" thay vì "username" để khớp chính xác với biến trong Backend
            const res = await fetchAPI('/login', 'POST', { identifier: identifier, password: password });

            // Xử lý lưu Token và User Info (API Response bọc kết quả trong object 'data')
            localStorage.setItem('accessToken', res.data.accessToken);
            localStorage.setItem('refreshToken', res.data.refreshToken);
            localStorage.setItem('user', JSON.stringify({
                id: res.data.id,
                username: res.data.username,
                role: res.data.role
            }));

            // CHUYỂN HƯỚNG SANG TRANG dashboard BẰNG CONTROLLER
            window.location.href = '/dashboard';
        } catch (err) {
            console.error("Login Error:", err);
        }
    });

    // Đăng ký
    document.getElementById('form-register').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('reg-username').value;
        const email = document.getElementById('reg-email').value;
        const password = document.getElementById('reg-password').value;
        try {
            const res = await fetchAPI('/register', 'POST', { username, email, password });
            Swal.fire('Thành công!', res.message, 'success');
            document.getElementById('verify-email').value = email;
            switchPage('page-verify-email');
        } catch (err) {}
    });

    // Xác thực
    document.getElementById('form-verify-email').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('verify-email').value;
        const otp = document.getElementById('verify-otp').value;
        try {
            const res = await fetchAPI('/verify-email', 'POST', { email, otp });
            Swal.fire('Xác thực thành công!', res.message, 'success').then(() => switchPage('page-login'));
        } catch (err) {}
    });

    // Quên / Reset mật khẩu
    document.getElementById('form-forgot-password').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('forgot-email').value;
        try {
            const res = await fetchAPI('/forgot-password', 'POST', { email });
            Swal.fire('Đã gửi OTP!', res.message, 'success');
            document.getElementById('reset-email').value = email;
            switchPage('page-reset-password');
        } catch (err) {}
    });

    document.getElementById('form-reset-password').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('reset-email').value;
        const otp = document.getElementById('reset-otp').value;
        const newPassword = document.getElementById('reset-new-password').value;
        try {
            const res = await fetchAPI('/reset-password', 'POST', { email, otp, newPassword });
            Swal.fire('Thành công!', res.message, 'success').then(() => switchPage('page-login'));
        } catch (err) {}
    });

    async function resendOtp(inputId) {
        const email = document.getElementById(inputId).value;
        if (!email) return Toast.fire({ icon: 'warning', title: 'Không tìm thấy Email' });
        try {
            const res = await fetchAPI('/resend-otp', 'POST', { email });
            Toast.fire({ icon: 'success', title: res.message });
        } catch (err) {}
    }
</script>
</body>
</html>
