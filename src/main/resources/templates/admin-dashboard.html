<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title}">Dashboard</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
</head>
<body class="hold-transition sidebar-mini">
<div class="wrapper">

    <!-- Navbar -->
    <nav class="main-header navbar navbar-expand navbar-white navbar-light">
        <ul class="navbar-nav">
            <li class="nav-item">
                <a class="nav-link" data-widget="pushmenu" href="#" role="button"><i class="fas fa-bars"></i></a>
            </li>
        </ul>
        <ul class="navbar-nav ml-auto">
            <li class="nav-item">
                <a class="nav-link" href="#" id="btnLogout" role="button" title="Đăng xuất">
                    <i class="fas fa-sign-out-alt"></i> Đăng xuất
                </a>
            </li>
        </ul>
    </nav>

    <!-- Main Sidebar Container -->
    <aside class="main-sidebar sidebar-dark-primary elevation-4">
        <a href="#" class="brand-link">
            <span class="brand-text font-weight-light text-center d-block"><b>University</b> Portal</span>
        </a>
        <div class="sidebar">
            <div class="user-panel mt-3 pb-3 mb-3 d-flex">
                <div class="info">
                    <a href="#" class="d-block" id="displayUsername">Admin User</a>
                </div>
            </div>
            <nav class="mt-2">
                <ul class="nav nav-pills nav-sidebar flex-column" data-widget="treeview" role="menu" data-accordion="false">
                    <li class="nav-item">
                        <a href="/admin-ui/dashboard" class="nav-link active">
                            <i class="nav-icon fas fa-tachometer-alt"></i>
                            <p>Dashboard Tổng quan</p>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/admin-ui/students" class="nav-link">
                            <i class="nav-icon fas fa-users"></i>
                            <p>Quản lý Sinh viên</p>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link">
                            <i class="nav-icon fas fa-book"></i>
                            <p>Quản lý Môn học</p>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </aside>

    <!-- Content Wrapper -->
    <div class="content-wrapper">
        <div class="content-header">
            <div class="container-fluid">
                <div class="row mb-2">
                    <div class="col-sm-6">
                        <h1 class="m-0">Bảng điều khiển</h1>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main content -->
        <div class="content">
            <div class="container-fluid">
                <!-- Info boxes -->
                <div class="row">
                    <div class="col-lg-3 col-6">
                        <div class="small-box bg-info">
                            <div class="inner"><h3 id="statStudents">0</h3><p>Tổng Sinh Viên</p></div>
                            <div class="icon"><i class="fas fa-user-graduate"></i></div>
                        </div>
                    </div>
                    <div class="col-lg-3 col-6">
                        <div class="small-box bg-success">
                            <div class="inner"><h3 id="statLecturers">0</h3><p>Tổng Giảng Viên</p></div>
                            <div class="icon"><i class="fas fa-chalkboard-teacher"></i></div>
                        </div>
                    </div>
                    <div class="col-lg-3 col-6">
                        <div class="small-box bg-warning">
                            <div class="inner"><h3 id="statCourses">0</h3><p>Môn Học</p></div>
                            <div class="icon"><i class="fas fa-book-open"></i></div>
                        </div>
                    </div>
                    <div class="col-lg-3 col-6">
                        <div class="small-box bg-danger">
                            <div class="inner"><h3 id="statClasses">0</h3><p>Lớp Học Phần</p></div>
                            <div class="icon"><i class="fas fa-layer-group"></i></div>
                        </div>
                    </div>
                </div>

                <!-- Charts Row -->
                <div class="row">
                    <!-- Bar Chart -->
                    <div class="col-md-8">
                        <div class="card card-primary">
                            <div class="card-header">
                                <h3 class="card-title">Sinh viên theo Khoa</h3>
                            </div>
                            <div class="card-body">
                                <canvas id="facultyChart" style="min-height: 250px; height: 250px; max-height: 250px; max-width: 100%;"></canvas>
                            </div>
                        </div>
                    </div>
                    <!-- Pie Chart -->
                    <div class="col-md-4">
                        <div class="card card-danger">
                            <div class="card-header">
                                <h3 class="card-title">Tỷ lệ Đậu / Rớt</h3>
                            </div>
                            <div class="card-body">
                                <canvas id="passFailChart" style="min-height: 250px; height: 250px; max-height: 250px; max-width: 100%;"></canvas>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <footer class="main-footer">
        <strong>Copyright &copy; 2024 <a href="#">University Management</a>.</strong> All rights reserved.
    </footer>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    $(document).ready(function() {
      const token = localStorage.getItem('jwtToken');
      if (!token) {
          window.location.href = '/admin-ui/login';
          return;
      }

      $('#displayUsername').text(localStorage.getItem('username') + ' (' + localStorage.getItem('role') + ')');

      // Cấu hình AJAX chung kèm Token
      $.ajaxSetup({
          headers: { 'Authorization': 'Bearer ' + token }
      });

      // 1. Lấy dữ liệu Tổng quan
      $.get('/api/reports/dashboard', function(data) {
          $('#statStudents').text(data.totalStudents);
          $('#statLecturers').text(data.totalLecturers);
          $('#statCourses').text(data.totalCourses);
          $('#statClasses').text(data.totalClasses);
      }).fail(handleAuthError);

      // 2. Vẽ biểu đồ Khoa (Bar Chart)
      $.get('/api/reports/faculty-stats', function(data) {
          const labels = data.map(item => item.faculty);
          const counts = data.map(item => item.count);

          new Chart(document.getElementById('facultyChart').getContext('2d'), {
              type: 'bar',
              data: {
                  labels: labels,
                  datasets: [{
                      label: 'Số lượng sinh viên',
                      backgroundColor: 'rgba(60,141,188,0.9)',
                      data: counts
                  }]
              },
              options: { responsive: true, maintainAspectRatio: false }
          });
      });

      // 3. Vẽ biểu đồ Đậu Rớt (Pie Chart)
      $.get('/api/reports/pass-fail-ratio', function(data) {
          new Chart(document.getElementById('passFailChart').getContext('2d'), {
              type: 'pie',
              data: {
                  labels: ['Đậu (' + data.passRate + '%)', 'Rớt (' + data.failRate + '%)'],
                  datasets: [{
                      data: [data.passCount, data.failCount],
                      backgroundColor: ['#28a745', '#dc3545']
                  }]
              },
              options: { responsive: true, maintainAspectRatio: false }
          });
      });

      $('#btnLogout').on('click', function(e) {
          e.preventDefault();
          localStorage.clear();
          window.location.href = '/admin-ui/login';
      });

      function handleAuthError(xhr) {
          if(xhr.status === 401 || xhr.status === 403) {
              alert("Phiên đăng nhập hết hạn hoặc bạn không có quyền ADMIN!");
              localStorage.clear();
              window.location.href = '/admin-ui/login';
          }
      }
    });
</script>
</body>
</html>
